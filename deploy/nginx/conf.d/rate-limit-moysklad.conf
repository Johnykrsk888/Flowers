# Подключается из http { } через include /etc/nginx/conf.d/*.conf
# Лимиты на IP для прокси МойСклад (защита от злоупотреблений и перегрузки API).

# Каталог шлёт много параллельных GET (обогащение картинок); 20r/s давало 429 и пустые превью.
limit_req_zone $binary_remote_addr zone=moysklad_api:10m rate=300r/s;
limit_conn_zone $binary_remote_addr zone=moysklad_conn:10m;
