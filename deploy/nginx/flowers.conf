# Сайт + прокси МойСклад + HTTPS (Let's Encrypt / certbot).
# DNS: A/AAAA для www.boombuket.ru и boombuket.ru → IP сервера.
# После правок вручную: nginx -t && systemctl reload nginx

server {
    server_name www.boombuket.ru boombuket.ru;

    root /var/www/flowers;
    index index.html;

    # Прямой /api/moysklad/download/{uuid} (хранилище в mediaUrl.ts).
    # Префикс ^~ — надёжнее regex: старый шаблон .*/download сюда не попадал → 415.
    location ^~ /api/moysklad/download/ {
        include /etc/nginx/snippets/moysklad_rate_limits.conf;
        include /etc/nginx/snippets/moysklad_proxy_headers.conf;
        rewrite ^/api/moysklad(.*)$ /api/remap/1.2$1 break;
        proxy_pass https://api.moysklad.ru;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_set_header Host api.moysklad.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept "*/*";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # Вложенные .../entity/.../images/.../download (не начинаются с /download/).
    location ~ ^/api/moysklad/.+/download(?:$|\?) {
        include /etc/nginx/snippets/moysklad_rate_limits.conf;
        include /etc/nginx/snippets/moysklad_proxy_headers.conf;
        rewrite ^/api/moysklad(.*)$ /api/remap/1.2$1 break;
        proxy_pass https://api.moysklad.ru;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_set_header Host api.moysklad.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept "*/*";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # JSON API
    location /api/moysklad/ {
        include /etc/nginx/snippets/moysklad_rate_limits.conf;
        include /etc/nginx/snippets/moysklad_proxy_headers.conf;
        rewrite ^/api/moysklad(.*)$ /api/remap/1.2$1 break;
        proxy_pass https://api.moysklad.ru;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_set_header Host api.moysklad.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept "application/json;charset=utf-8";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    ssl_certificate /etc/letsencrypt/live/www.boombuket.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.boombuket.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = boombuket.ru) {
        return 301 https://$host$request_uri;
    }

    if ($host = www.boombuket.ru) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name www.boombuket.ru boombuket.ru;
    return 404;
}
