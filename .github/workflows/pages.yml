# Публикация на GitHub Pages через Actions.
# Settings → Pages → Build: «GitHub Actions».
#
# Секреты (Settings → Secrets and variables → Actions):
#
# Вариант A — уже есть URL прокси:
#   VITE_MOYSKLAD_API_PREFIX = https://....workers.dev/api/moysklad
#
# Вариант B — автодеплой прокси (этот workflow сам вызывает wrangler deploy):
#   CLOUDFLARE_API_TOKEN      — API Token (Workers Scripts:Edit)
#   CLOUDFLARE_ACCOUNT_ID     — из обзора аккаунта Cloudflare
#   MOYSKLAD_LOGIN            — логин API МойСклад
#   MOYSKLAD_PASSWORD       — пароль API
#   (опционально) CLOUDFLARE_WORKERS_DEV_SUBDOMAIN — поддомен workers.dev (часть до .workers.dev),
#       если wrangler не вывел URL в лог — тогда префикс соберётся как
#       https://flowers-moysklad-proxy.<SUBDOMAIN>.workers.dev/api/moysklad

name: Deploy to GitHub Pages

# Автодеплой на основной сайт — workflow deploy-vps.yml.
# Pages: только вручную (или верните on.push при необходимости).
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci

      - name: Прокси МойСклад (Cloudflare Worker) и префикс для сборки
        id: moysklad_proxy
        working-directory: proxy
        env:
          VITE_PREFIX: ${{ secrets.VITE_MOYSKLAD_API_PREFIX }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_WORKERS_DEV_SUBDOMAIN: ${{ secrets.CLOUDFLARE_WORKERS_DEV_SUBDOMAIN }}
          ML: ${{ secrets.MOYSKLAD_LOGIN }}
          MP: ${{ secrets.MOYSKLAD_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${VITE_PREFIX:-}" ]; then
            echo "prefix=${VITE_PREFIX}" >>"$GITHUB_OUTPUT"
            echo "Используется секрет VITE_MOYSKLAD_API_PREFIX."
            exit 0
          fi
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::warning::Нет VITE_MOYSKLAD_API_PREFIX и нет CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID — каталог на Pages не подключится к МойСклад."
            echo "prefix=" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${ML:-}" ] || [ -z "${MP:-}" ]; then
            echo "::error::Для автодеплоя Worker добавьте секреты MOYSKLAD_LOGIN и MOYSKLAD_PASSWORD."
            exit 1
          fi
          npm install -g wrangler@3
          printf '%s' "$ML" | wrangler secret put MOYSKLAD_LOGIN
          printf '%s' "$MP" | wrangler secret put MOYSKLAD_PASSWORD
          set +e
          wrangler deploy 2>&1 | tee deploy.log
          WRC=$?
          set -e
          if [ "$WRC" != 0 ]; then
            echo "::error::wrangler deploy завершился с ошибкой (код $WRC)."
            exit 1
          fi
          URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' deploy.log | head -1 || true)
          if [ -z "$URL" ] && [ -n "${CLOUDFLARE_WORKERS_DEV_SUBDOMAIN:-}" ]; then
            URL="https://flowers-moysklad-proxy.${CLOUDFLARE_WORKERS_DEV_SUBDOMAIN}.workers.dev"
          fi
          if [ -z "$URL" ]; then
            echo "::error::Не удалось определить URL Worker. Добавьте секрет VITE_MOYSKLAD_API_PREFIX или CLOUDFLARE_WORKERS_DEV_SUBDOMAIN."
            exit 1
          fi
          echo "prefix=${URL}/api/moysklad" >>"$GITHUB_OUTPUT"
          echo "Worker: ${URL}/api/moysklad"

      - name: Build static site
        run: npm run build
        env:
          VITE_MOYSKLAD_API_PREFIX: ${{ steps.moysklad_proxy.outputs.prefix }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
