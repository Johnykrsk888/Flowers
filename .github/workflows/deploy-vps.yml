# Автодеплой на VPS при push в main.
#
# Секреты (только «Repository secrets», не Environment — в workflow нет environment:):
#   Settings → Secrets and variables → Actions → New repository secret
#
#   DEPLOY_HOST    — IP или хост (например 79.174.91.140)
#   DEPLOY_USER    — SSH-пользователь (например root)
#   DEPLOY_SSH_KEY — приватный ключ целиком (BEGIN…END). Запасное имя: SSH_PRIVATE_KEY.
#                    Только вкладка «Actions» repository secrets (не Dependabot, не Environment без job.environment).
#
#   MOYSKLAD_LOGIN, MOYSKLAD_PASSWORD — те же, что в .env для API (для Python image-proxy на VPS).
#
#   Опционально для каталога (иначе берётся /etc/flowers/mysql-dotenv.txt на VPS):
#   CATALOG_MYSQL_USER, CATALOG_MYSQL_PASSWORD — или общие MYSQL_USER, MYSQL_PASSWORD.
#
# Ключ на сервере: публичная часть в ~/.ssh/authorized_keys для DEPLOY_USER.

name: Deploy to VPS (boombuket.ru)

on:
  push:
    branches: [main]
  workflow_dispatch:

# JS-actions (checkout, setup-node, upload-artifact…) на Node 20 deprecated; см. changelog GitHub Actions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# cancel-in-progress прерывает выгрузку по середине.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build production
        run: npm run build
        env:
          VITE_MOYSKLAD_API_PREFIX: https://www.boombuket.ru/api/moysklad

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      # Без отдельного action: явная проверка + ssh-add (понятная ошибка, если секрет пустой).
      - name: SSH agent и ключ
        env:
          K1: ${{ secrets.DEPLOY_SSH_KEY }}
          K2: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          KEY="${K1:-}"
          if [ -z "$KEY" ]; then KEY="${K2:-}"; fi
          if [ -z "$KEY" ]; then
            echo "::error::Нет приватного ключа: задайте Repository secret DEPLOY_SSH_KEY (или SSH_PRIVATE_KEY) — полный ключ из .deploy/github-actions-deploy. Локально: python scripts/set-github-deploy-secrets.py после gh auth login."
            exit 1
          fi
          eval "$(ssh-agent -s)"
          printf '%s\n' "$KEY" | tr -d '\r' | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      # На ubuntu-latest каталог ~/.ssh часто отсутствует — без mkdir ssh-keyscan падает.
      - name: Добавить хост в known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      # tar по SSH: на сервере не нужен rsync (достаточно tar + ssh, как в минимальном образе).
      - name: dist → /var/www/flowers (tar по SSH)
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          SSH=(ssh -T -o StrictHostKeyChecking=yes -o BatchMode=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=3)
          "${SSH[@]}" "$USER@$HOST" "mkdir -p /var/www/flowers"
          "${SSH[@]}" "$USER@$HOST" "find /var/www/flowers -mindepth 1 -delete"
          tar czf - -C dist . | "${SSH[@]}" "$USER@$HOST" "tar xzf - -C /var/www/flowers"

      - name: Права для nginx
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          ssh -T -o StrictHostKeyChecking=yes -o BatchMode=yes "$USER@$HOST" "chown -R www-data:www-data /var/www/flowers"

      # Python на 127.0.0.1:8787 — стрим картинок с IP сервера (иначе storage 401 после редиректа в браузере).
      - name: Moysklad image-proxy (Python) и systemd
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          LOGIN: ${{ secrets.MOYSKLAD_LOGIN }}
          PASS: ${{ secrets.MOYSKLAD_PASSWORD }}
        run: |
          set -euo pipefail
          SSH=(ssh -T -o StrictHostKeyChecking=yes -o BatchMode=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=3)
          scp -o StrictHostKeyChecking=yes -o BatchMode=yes deploy/moysklad-image-proxy.py "$USER@$HOST:/tmp/moysklad-image-proxy.py"
          scp -o StrictHostKeyChecking=yes -o BatchMode=yes deploy/systemd/moysklad-image-proxy.service "$USER@$HOST:/tmp/moysklad-image-proxy.service"
          "${SSH[@]}" "$USER@$HOST" 'install -d /opt/moysklad-image-proxy /etc/moysklad'
          "${SSH[@]}" "$USER@$HOST" 'if [ "$(id -u)" -eq 0 ]; then cp /tmp/moysklad-image-proxy.py /opt/moysklad-image-proxy/moysklad-image-proxy.py && chmod 755 /opt/moysklad-image-proxy/moysklad-image-proxy.py && cp /tmp/moysklad-image-proxy.service /etc/systemd/system/moysklad-image-proxy.service; else sudo cp /tmp/moysklad-image-proxy.py /opt/moysklad-image-proxy/moysklad-image-proxy.py && sudo chmod 755 /opt/moysklad-image-proxy/moysklad-image-proxy.py && sudo cp /tmp/moysklad-image-proxy.service /etc/systemd/system/moysklad-image-proxy.service; fi'
          if [ -n "${LOGIN:-}" ] && [ -n "${PASS:-}" ]; then
            printf '%s\n' "MOYSKLAD_LOGIN=${LOGIN}" "MOYSKLAD_PASSWORD=${PASS}" > /tmp/moysklad-image-proxy.env
            scp -o StrictHostKeyChecking=yes -o BatchMode=yes /tmp/moysklad-image-proxy.env "$USER@$HOST:/tmp/moysklad-image-proxy.env"
            rm -f /tmp/moysklad-image-proxy.env
            "${SSH[@]}" "$USER@$HOST" 'if [ "$(id -u)" -eq 0 ]; then mv /tmp/moysklad-image-proxy.env /etc/moysklad/moysklad-image-proxy.env && chmod 600 /etc/moysklad/moysklad-image-proxy.env; else sudo mv /tmp/moysklad-image-proxy.env /etc/moysklad/moysklad-image-proxy.env && sudo chmod 600 /etc/moysklad/moysklad-image-proxy.env; fi'
          else
            echo "::warning::MOYSKLAD_LOGIN/MOYSKLAD_PASSWORD не в Secrets — нужен файл /etc/moysklad/moysklad-image-proxy.env на сервере"
          fi
          "${SSH[@]}" "$USER@$HOST" 'command -v python3 >/dev/null 2>&1 || (export DEBIAN_FRONTEND=noninteractive; apt-get update -y && apt-get install -y python3)'
          "${SSH[@]}" "$USER@$HOST" 'test -f /etc/moysklad/moysklad-image-proxy.env' || { echo "::error::Нет /etc/moysklad/moysklad-image-proxy.env — добавьте MOYSKLAD_LOGIN и MOYSKLAD_PASSWORD в GitHub Secrets (как в .env) или создайте файл на сервере"; exit 1; }
          "${SSH[@]}" "$USER@$HOST" 'if [ "$(id -u)" -eq 0 ]; then systemctl daemon-reload && systemctl enable moysklad-image-proxy && systemctl restart moysklad-image-proxy; else sudo systemctl daemon-reload && sudo systemctl enable moysklad-image-proxy && sudo systemctl restart moysklad-image-proxy; fi'

      # Node на 127.0.0.1:8788 — GET /api/catalog/products, /uploads (nginx → 8788; 8787 занят Python).
      - name: Flowers catalog (Node + systemd flowers-catalog)
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          MU: ${{ secrets.CATALOG_MYSQL_USER }}
          MP: ${{ secrets.CATALOG_MYSQL_PASSWORD }}
          MU_ALT: ${{ secrets.MYSQL_USER }}
          MP_ALT: ${{ secrets.MYSQL_PASSWORD }}
          LOGIN: ${{ secrets.MOYSKLAD_LOGIN }}
          PASS: ${{ secrets.MOYSKLAD_PASSWORD }}
        run: |
          set -euo pipefail
          SSH=(ssh -T -o StrictHostKeyChecking=yes -o BatchMode=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=3)
          if [ -z "${MU:-}" ]; then MU="${MU_ALT:-}"; fi
          if [ -z "${MP:-}" ]; then MP="${MP_ALT:-}"; fi
          export MU MP
          tar czf - server src/moysklad package.json package-lock.json tsconfig.json | "${SSH[@]}" "$USER@$HOST" "install -d /opt/flowers-catalog && tar xzf - -C /opt/flowers-catalog"
          scp -o StrictHostKeyChecking=yes -o BatchMode=yes deploy/systemd/flowers-catalog.service "$USER@$HOST:/tmp/flowers-catalog.service"
          "${SSH[@]}" "$USER@$HOST" 'export DEBIAN_FRONTEND=noninteractive; if command -v node >/dev/null 2>&1; then true; elif [ "$(id -u)" -eq 0 ]; then curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y nodejs; else sudo bash -c "curl -fsSL https://deb.nodesource.com/setup_22.x | bash -" && sudo apt-get install -y nodejs; fi'
          "${SSH[@]}" "$USER@$HOST" "cd /opt/flowers-catalog && npm ci --omit=dev"
          "${SSH[@]}" "$USER@$HOST" 'install -d /opt/flowers-catalog/server/data/uploads/products'
          if [ -n "${MU:-}" ] && [ -n "${MP:-}" ]; then
            python3 deploy/write-catalog-env.py
            scp -o StrictHostKeyChecking=yes -o BatchMode=yes /tmp/catalog.env "$USER@$HOST:/tmp/catalog.env"
            rm -f /tmp/catalog.env
            "${SSH[@]}" "$USER@$HOST" 'if [ "$(id -u)" -eq 0 ]; then install -d /etc/flowers && mv /tmp/catalog.env /etc/flowers/catalog.env && chmod 600 /etc/flowers/catalog.env; else sudo install -d /etc/flowers && sudo mv /tmp/catalog.env /etc/flowers/catalog.env && sudo chmod 600 /etc/flowers/catalog.env; fi'
          elif "${SSH[@]}" "$USER@$HOST" "test -f /etc/flowers/mysql-dotenv.txt"; then
            echo "::notice::Берём MYSQL_USER/MYSQL_PASSWORD из /etc/flowers/mysql-dotenv.txt на сервере"
            "${SSH[@]}" "$USER@$HOST" "cat /etc/flowers/mysql-dotenv.txt" > /tmp/mysql-dotenv.txt
            python3 deploy/write-catalog-env.py --from-file /tmp/mysql-dotenv.txt
            rm -f /tmp/mysql-dotenv.txt
            scp -o StrictHostKeyChecking=yes -o BatchMode=yes /tmp/catalog.env "$USER@$HOST:/tmp/catalog.env"
            rm -f /tmp/catalog.env
            "${SSH[@]}" "$USER@$HOST" 'if [ "$(id -u)" -eq 0 ]; then install -d /etc/flowers && mv /tmp/catalog.env /etc/flowers/catalog.env && chmod 600 /etc/flowers/catalog.env; else sudo install -d /etc/flowers && sudo mv /tmp/catalog.env /etc/flowers/catalog.env && sudo chmod 600 /etc/flowers/catalog.env; fi'
          elif "${SSH[@]}" "$USER@$HOST" "test -f /etc/flowers/catalog.env"; then
            echo "::notice::Используется существующий /etc/flowers/catalog.env на сервере"
          else
            echo "::error::Нет учётных данных MariaDB: задайте Secrets CATALOG_MYSQL_* или MYSQL_USER/MYSQL_PASSWORD, либо создайте на VPS /etc/flowers/mysql-dotenv.txt (как после vps-mysql-phpmyadmin.sh) или /etc/flowers/catalog.env"
            exit 1
          fi
          "${SSH[@]}" "$USER@$HOST" 'if [ "$(id -u)" -eq 0 ]; then cp /tmp/flowers-catalog.service /etc/systemd/system/flowers-catalog.service; else sudo cp /tmp/flowers-catalog.service /etc/systemd/system/flowers-catalog.service; fi'
          "${SSH[@]}" "$USER@$HOST" 'if [ "$(id -u)" -eq 0 ]; then systemctl daemon-reload && systemctl enable flowers-catalog && systemctl restart flowers-catalog; else sudo systemctl daemon-reload && sudo systemctl enable flowers-catalog && sudo systemctl restart flowers-catalog; fi'
          echo "::notice::Синхронизация МойСклад → БД и скачивание изображений на диск VPS (без этого /uploads/ даёт 404)"
          "${SSH[@]}" "$USER@$HOST" "cd /opt/flowers-catalog && DOTENV_CONFIG_PATH=/etc/flowers/catalog.env node ./node_modules/tsx/dist/cli.mjs server/sync-cli.ts"
          "${SSH[@]}" "$USER@$HOST" "curl -sfS http://127.0.0.1:8788/api/catalog/products >/dev/null" || { echo "::error::catalog-server не отвечает на 8788"; exit 1; }
          echo "::notice::flowers-catalog активен на 127.0.0.1:8788"
          scp -o StrictHostKeyChecking=yes -o BatchMode=yes deploy/systemd/flowers-catalog-sync.service "$USER@$HOST:/tmp/flowers-catalog-sync.service"
          scp -o StrictHostKeyChecking=yes -o BatchMode=yes deploy/systemd/flowers-catalog-sync.timer "$USER@$HOST:/tmp/flowers-catalog-sync.timer"
          "${SSH[@]}" "$USER@$HOST" 'if [ "$(id -u)" -eq 0 ]; then cp /tmp/flowers-catalog-sync.service /etc/systemd/system/flowers-catalog-sync.service && cp /tmp/flowers-catalog-sync.timer /etc/systemd/system/flowers-catalog-sync.timer; else sudo cp /tmp/flowers-catalog-sync.service /etc/systemd/system/flowers-catalog-sync.service && sudo cp /tmp/flowers-catalog-sync.timer /etc/systemd/system/flowers-catalog-sync.timer; fi'
          "${SSH[@]}" "$USER@$HOST" 'if [ "$(id -u)" -eq 0 ]; then systemctl daemon-reload && systemctl enable flowers-catalog-sync.timer && systemctl restart flowers-catalog-sync.timer; else sudo systemctl daemon-reload && sudo systemctl enable flowers-catalog-sync.timer && sudo systemctl restart flowers-catalog-sync.timer; fi'
          echo "::notice::Таймер flowers-catalog-sync.timer: синхронизация МойСклад каждые ~5 мин (systemctl list-timers flowers-catalog-sync.timer)"

      # Nginx: vhost + лимиты (без обновления snippets/conf.d на сервере 429 при каталоге).
      - name: Nginx flowers.conf, rate-limit, snippets и reload
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          SSH=(ssh -T -o StrictHostKeyChecking=yes -o BatchMode=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=3)
          scp -o StrictHostKeyChecking=yes -o BatchMode=yes deploy/nginx/flowers.conf "$USER@$HOST:/tmp/flowers.conf"
          scp -o StrictHostKeyChecking=yes -o BatchMode=yes deploy/nginx/conf.d/rate-limit-moysklad.conf "$USER@$HOST:/tmp/rate-limit-moysklad.conf"
          scp -o StrictHostKeyChecking=yes -o BatchMode=yes deploy/nginx/snippets/moysklad_rate_limits.conf "$USER@$HOST:/tmp/moysklad_rate_limits.conf"
          scp -o StrictHostKeyChecking=yes -o BatchMode=yes deploy/nginx/snippets/phpmyadmin_location.conf "$USER@$HOST:/tmp/phpmyadmin_location.conf"
          "${SSH[@]}" "$USER@$HOST" 'if [ "$(id -u)" -eq 0 ]; then install -d /etc/nginx/conf.d /etc/nginx/snippets; cp /tmp/flowers.conf /etc/nginx/sites-available/flowers; cp /tmp/rate-limit-moysklad.conf /etc/nginx/conf.d/rate-limit-moysklad.conf; cp /tmp/moysklad_rate_limits.conf /etc/nginx/snippets/moysklad_rate_limits.conf; cp /tmp/phpmyadmin_location.conf /etc/nginx/snippets/phpmyadmin_location.conf; nginx -t && systemctl reload nginx; else sudo install -d /etc/nginx/conf.d /etc/nginx/snippets; sudo cp /tmp/flowers.conf /etc/nginx/sites-available/flowers; sudo cp /tmp/rate-limit-moysklad.conf /etc/nginx/conf.d/rate-limit-moysklad.conf; sudo cp /tmp/moysklad_rate_limits.conf /etc/nginx/snippets/moysklad_rate_limits.conf; sudo cp /tmp/phpmyadmin_location.conf /etc/nginx/snippets/phpmyadmin_location.conf; sudo nginx -t && sudo systemctl reload nginx; fi'
